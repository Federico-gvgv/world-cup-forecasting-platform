services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: world-cup-forecasting-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./reports:/app/reports:ro
      - ./configs:/app/configs:ro
    environment:
      - PYTHONPATH=/app/src

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: world-cup-forecasting-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./reports:/app/reports:ro
      - ./configs:/app/configs:ro
    environment:
      - PYTHONPATH=/app/src
      - API_BASE_URL=http://api:8000
    command:
      [
        "streamlit",
        "run",
        "src/wc_forecast/dashboard/app.py",
        "--server.address",
        "0.0.0.0",
        "--server.port",
        "8501"
      ]
    depends_on:
      - api